<!DOCTYPE html>
<html>
<head>
    <title>Narrow One Secret Shop</title>
    <style>
        body { background: #121212; color: #00ffaa; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { border: 1px solid #333; padding: 10px; text-align: center; background: #1e1e1e; border-radius: 8px; }
        img { width: 100%; height: auto; background: #000; border-radius: 4px; }
        .error { color: #ff4444; background: #331111; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🏹 Narrow One Shop - Debug Mode</h1>
    <div id="debug-info"></div> <div id="output" class="grid"></div>

    <script>
        // 【重要】ここをお前の情報に正確に書き換えてくれ！
        const USER = '4wmb9h9g77-jpg';
        const REPO = 'narrow-one-shop';
        // ファイル名が .txt ならここを torsoImage.txt に変更しろ！
        const FILE = 'torso.json'; 

        const DATA_URL = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}`;

        async function loadData() {
            const debugInfo = document.getElementById('debug-info');
            const output = document.getElementById('output');

            try {
                console.log("Fetching from:", DATA_URL);
                const res = await fetch(DATA_URL);
                
                if (!res.ok) {
                    throw new Error(`データの取得に失敗したぜ！ (Status: ${res.status})\nURLが間違っていないか確認してくれ。`);
                }

                const data = await res.json();
                
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<img src="${item.image}"><p style="font-size:12px;">${item.id}</p>`;
                    output.appendChild(div);
                });

                debugInfo.innerHTML = `<p style="color: #00ff00;">✅ ${data.length}個のアイテムを読み込んだぜ！</p>`;

            } catch (err) {
                console.error(err);
                debugInfo.innerHTML = `<div class="error">❌ エラー発生:<br>${err.message}<br><br>現在の設定URL:<br>${DATA_URL}</div>`;
            }
        }
        loadData();
    </script>
</body>
</html>
