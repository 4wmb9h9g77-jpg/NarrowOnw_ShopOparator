<!DOCTYPE html>
<html>
<head>
    <title>Narrow One Secret Shop</title>
    <style>
        body { background: #121212; color: #00ffaa; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { border: 1px solid #333; padding: 10px; text-align: center; background: #1e1e1e; border-radius: 8px; }
        img { width: 100%; height: auto; background: #000; border-radius: 4px; min-height: 100px; }
    </style>
</head>
<body>
    <h1>🏹 Narrow One Secret Shop</h1>
    <div id="output" class="grid"></div>

    <script>
    async function loadData() {
        // 同じ場所にあるファイルを名前だけで指定する！
        const FILE_NAME = 'torsoImage.json'; 

        try {
            console.log("Fetching:", FILE_NAME);
            const res = await fetch(FILE_NAME); // これだけでOK！
            
            if (!res.ok) throw new Error("Status: " + res.status);

            const data = await res.json();
            const output = document.getElementById('output');
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${item.image}"><p>${item.id}</p>`;
                output.appendChild(div);
            });
        } catch (err) {
            document.body.innerHTML += `<h2 style="color:red">ERROR: ${err.message}</h2>`;
        }
    }
    loadData();
</script>
</body>
</html>
