<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Narrow One Shop Operator</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent: #00ffaa;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: 'Arial', sans-serif; margin: 0; padding: 20px;
        }
        .hidden { display: none !important; }
        
        h1, h2 { text-align: center; color: var(--accent); text-transform: uppercase; }
        
        /* グリッドレイアウト */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }

        /* アイテム・クラスカード */
        .card {
            background: var(--panel-bg); border: 2px solid #333;
            border-radius: 10px; padding: 10px; text-align: center;
            cursor: pointer; transition: 0.2s; position: relative;
        }
        .card:hover { border-color: var(--accent); transform: scale(1.05); }
        .card img { width: 100%; height: 120px; object-fit: contain; background: #0c0c0c; border-radius: 5px; }
        
        /* ボタン類 */
        .btn {
            background: #2c3e50; color: white; border: none;
            padding: 8px 15px; border-radius: 5px; cursor: pointer;
            font-weight: bold; width: 100%; margin-top: 10px;
        }
        .btn:hover { background: var(--accent); color: black; }
        .back-btn { width: auto; background: #ff4444; margin-bottom: 20px; }

        /* カテゴリタブ */
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #333; color: white; border: 2px solid #444; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: black; border-color: var(--accent); }

        /* 価格タグ */
        .price-tag {
            background: rgba(0,0,0,0.8); color: gold;
            padding: 5px; border-radius: 5px; margin-top: 10px;
            font-weight: bold; font-size: 14px;
        }
        .owned-tag { color: #00ffaa; }
    </style>
</head>
<body>

    <div id="screen-home">
        <h1>Select Skin to Edit</h1>
        
        <h2>Classic Skins</h2>
        <div id="classic-grid" class="grid"></div>

        <h2>Presets (Custom)</h2>
        <div id="preset-grid" class="grid"></div>
    </div>

    <div id="screen-editor" class="hidden">
        <button class="btn back-btn" onclick="goHome()">◀ Back to Home</button>
        <h2 id="editor-title">Editing: ???</h2>

        <div class="tabs" id="main-tabs">
            <button class="tab-btn active" onclick="loadCategory('head')">Head</button>
            <button class="tab-btn" onclick="loadCategory('torso')">Torso</button>
            <button class="tab-btn" onclick="loadCategory('arms')">Arms</button>
            <button class="tab-btn" onclick="loadCategory('legs')">Legs</button>
            <button class="tab-btn" onclick="loadCategory('quiver')">Quiver</button>
            <button class="tab-btn" onclick="loadCategory('bow')">Bow</button>
            <button class="tab-btn" onclick="loadCategory('arrow')">Arrow</button>
            <button class="tab-btn" onclick="loadCategory('melee')">Melee</button>
        </div>

        <div class="tabs hidden" id="sub-tabs-bow">
            <button class="tab-btn active" onclick="loadSubCategory('handle')">Handle</button>
            <button class="tab-btn" onclick="loadSubCategory('tip')">Tip</button>
        </div>

        <div id="item-grid" class="grid"></div>
    </div>

    <script>
        const classes = ["Scout", "Assault", "Sharpshooter", "Runner", "Support", "Defender"];
        
        // 🚨 【ハッカー用設定】自分が持っているアイテムIDのリスト（後でGASから取得する）
        const myOwnedItems = ["basicArmorBody", "commonerHat", "peasantBody"]; 
        
        // 🚨 価格データ（本来は price.json から読み込むが、テスト用のモック）
        // 実際の運用では price.json とマージするロジックを組む
        const mockPriceData = {
            "skel_torso_01": { price: 500, isAd: false },
            "basicArmorBody": { price: 390, isAd: false }, // 所持済みテスト用
            "vikingArmor": { price: 720, isAd: true }
        };

        // --- 初期化 ---
        function init() {
            renderHome();
        }

        // --- 画面1: ホームの描画 ---
        function renderHome() {
            const classicGrid = document.getElementById('classic-grid');
            const presetGrid = document.getElementById('preset-grid');
            classicGrid.innerHTML = ''; presetGrid.innerHTML = '';

            // Classic Skinsの生成
            classes.forEach(cls => {
                classicGrid.innerHTML += `
                    <div class="card">
                        <h3>${cls}</h3>
                        <div style="height:80px; background:#333; margin-bottom:10px;">(Preview)</div>
                        <button class="btn" onclick="openEditor('Classic: ${cls}')">EDIT</button>
                    </div>
                `;
            });

            // Presetの生成 (テスト用に3つ作成)
            for(let i=1; i<=3; i++) {
                presetGrid.innerHTML += `
                    <div class="card">
                        <h3>Preset ${i}</h3>
                        <div style="height:80px; background:#444; margin-bottom:10px;">(Preview)</div>
                        <button class="btn" onclick="openPresetSelect(${i})">EDIT</button>
                    </div>
                `;
            }
        }

        // PresetのEDITを押した時 (どのクラスベースで編集するか聞く)
        function openPresetSelect(presetId) {
            const baseClass = prompt(`Preset ${presetId} を編集します。ベースにするクラスを入力してください\n(Scout, Assault, Sharpshooter, Runner, Support, Defender)`);
            if(classes.includes(baseClass)) {
                openEditor(`Preset ${presetId} (${baseClass})`);
            } else if (baseClass) {
                alert("正しいクラス名を入力してくれ！");
            }
        }

        // --- 画面遷移 ---
        function openEditor(title) {
            document.getElementById('screen-home').classList.add('hidden');
            document.getElementById('screen-editor').classList.remove('hidden');
            document.getElementById('editor-title').innerText = `Editing: ${title}`;
            loadCategory('torso'); // 初期カテゴリは Torso にしておくぜ
        }

        function goHome() {
            document.getElementById('screen-editor').classList.add('hidden');
            document.getElementById('screen-home').classList.remove('hidden');
        }

        // --- カテゴリの読み込みロジック ---
        async function loadCategory(category) {
            // タブの見た目更新
            document.querySelectorAll('#main-tabs .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Bow分岐の処理
            const subTabs = document.getElementById('sub-tabs-bow');
            if(category === 'bow') {
                subTabs.classList.remove('hidden');
                loadSubCategory('handle'); // Bowが押されたら最初はHandleを出す
                return;
            } else {
                subTabs.classList.add('hidden');
            }

            // データ取得（ファイル名は category + "Image.json" になると想定）
            // 例: torsoImage.json, headImage.json
            fetchAndRender(category + 'Image.json');
        }

        function loadSubCategory(subCat) {
            document.querySelectorAll('#sub-tabs-bow .tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 例: bowHandleImage.json などを読み込む想定
            fetchAndRender('bow' + subCat.charAt(0).toUpperCase() + subCat.slice(1) + 'Image.json');
        }

        // --- アイテムの描画（価格と所持判定） ---
        async function fetchAndRender(fileName) {
            const grid = document.getElementById('item-grid');
            grid.innerHTML = '<p style="text-align:center; width:100%;">Loading data...</p>';

            try {
                // 相対パスで読み込む（GitHubにある各JSONファイル）
                const res = await fetch(fileName);
                if (!res.ok) throw new Error("File not found");
                const data = await res.json();
                
                grid.innerHTML = '';
                
                data.forEach(item => {
                    // 所持チェック
                    const isOwned = myOwnedItems.includes(item.id);
                    // 価格チェック (モックから取得。なければ適当に500コイン)
                    const priceInfo = mockPriceData[item.id] || { price: 500, isAd: false };
                    
                    let priceHTML = '';
                    if (isOwned) {
                        priceHTML = `<div class="price-tag owned-tag">✅ OWNED</div>`;
                    } else if (priceInfo.isAd) {
                        priceHTML = `<div class="price-tag">📺 Watch Ad</div>`;
                    } else {
                        priceHTML = `<div class="price-tag">💰 ${priceInfo.price}</div>`;
                    }

                    // IDはHTMLの属性に隠しておき、画面には出さない
                    grid.innerHTML += `
                        <div class="card" onclick="alert('装備したぜ: ${item.id}')" data-id="${item.id}">
                            <img src="${item.image}" alt="item">
                            ${priceHTML}
                        </div>
                    `;
                });
            } catch (err) {
                grid.innerHTML = `<p style="color:red; text-align:center; width:100%;">❌ ${fileName} が見つからないぜ！まだアップロードしてないな？</p>`;
            }
        }

        // 起動！
        init();
    </script>
</body>
</html>
